<svg xmlns="http://www.w3.org/2000/svg" width="250" height="44" viewBox="0 0 250 44" role="img" aria-labelledby="title desc">
  <title id="title">Nebrex header logo</title>
  <desc id="desc">Nebrex NX wordmark with The AI Automation Company subtitle.</desc>
  <style>
    .mark,
    .word {
      font-family: "Michroma", "Space Grotesk", system-ui, sans-serif;
      fill: #F0EDE8;
    }

    .sub {
      font-family: "Space Grotesk", system-ui, sans-serif;
      fill: rgba(240, 237, 232, 0.72);
      font-weight: 700;
      letter-spacing: 0.11em;
    }
  </style>
  <g transform="translate(0 6)">
    <text class="mark" x="0" y="24" font-size="21" font-weight="800" letter-spacing="-0.5">N</text>
    <text class="mark" x="24" y="24" font-size="28" font-weight="800" transform="scale(1.18 1) translate(-2 0)">X</text>
  </g>
  <g transform="translate(67 9)">
    <text class="word" x="0" y="14" font-size="14" font-weight="500" letter-spacing="0.14em">NEBRE</text>
    <text class="word" x="82" y="14" font-size="17.08" font-weight="800" transform="scale(1.18 1) translate(-12 0)">X</text>
    <text class="sub" x="0" y="25" font-size="7">THE AI AUTOMATION COMPANY</text>
  </g>
</svg>
