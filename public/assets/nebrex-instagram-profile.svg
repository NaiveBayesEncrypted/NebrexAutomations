<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Nebrex Instagram profile picture</title>
  <desc id="desc">A sharp black and cream Nebrex NX mark with a subtle premium dot grid.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Michroma&amp;display=swap');
    .mark { font-family: Michroma, system-ui, sans-serif; font-weight: 800; }
  </style>
  <defs>
    <pattern id="tinyDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="17" cy="17" r="1.45" fill="#F0EDE8" opacity="0.18"/>
    </pattern>
    <linearGradient id="creamInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#ECE7DE"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="118" y="118" width="844" height="844" rx="198"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1080" fill="#000000"/>
  <rect x="118" y="118" width="844" height="844" rx="198" fill="#000000"/>

  <g clip-path="url(#iconClip)">
    <rect x="118" y="118" width="844" height="844" fill="#000000"/>
    <rect x="118" y="118" width="844" height="844" fill="url(#tinyDots)" opacity="0.55"/>
    <rect x="118" y="118" width="844" height="844" fill="#000000" opacity="0.18"/>
  </g>

  <rect x="118" y="118" width="844" height="844" rx="198" fill="none" stroke="#F0EDE8" stroke-opacity="0.18" stroke-width="2"/>

  <g class="mark" fill="url(#creamInk)" transform="translate(102 106) scale(7.95)">
    <text x="28" y="68" font-size="38">N</text>
    <text x="55" y="68" font-size="46" letter-spacing="-1" transform="scale(1.1, 1) translate(-3, 0)">X</text>
  </g>
</svg>
